scenarios:
  - id: lane_following
    description: Ego vehicle follows its lane without relevant obstacles ahead
    keywords: [lane_detection, sensor_fusion_localization, local_navigation, steering_control]
    parameters:
      road_curvature: [low, medium]
      ego_speed_kmh: [20, 60]

  - id: pedestrian_crossing
    description: Pedestrian crosses the ego lane in front of the vehicle
    keywords: [object_detection, lane_detection, sensor_fusion_localization, local_navigation, braking]
    parameters:
      ego_speed_kmh: [20, 50]
      pedestrian_speed_ms: [0.5, 2.0]
      crossing_distance_m: [5, 25]
      occlusion: [false, true]

  - id: static_obstacle
    description: Static obstacle blocks the ego lane
    keywords: [object_detection, lane_detection, sensor_fusion_localization, local_navigation, braking]
    parameters:
      ego_speed_kmh: [20, 70]
      obstacle_distance_m: [8, 40]
      obstacle_width_m: [0.5, 2.5]

  - id: merge_into_traffic
    description: Ego vehicle merges into a lane occupied by other traffic participants
    keywords: [object_detection, radar_perception, lane_detection, sensor_fusion_localization, local_navigation, steering_control, braking]
    parameters:
      ego_speed_kmh: [30, 80]
      target_lane_gap_m: [5, 25]
      other_vehicle_speed_kmh: [30, 100]

  - id: intersection_approach
    description: Ego vehicle approaches an intersection with crossing traffic
    keywords: [object_detection, lane_detection, sensor_fusion_localization, global_navigation, local_navigation, braking]
    parameters:
      ego_speed_kmh: [20, 60]
      crossing_vehicle_speed_kmh: [10, 70]
      time_to_intersection_s: [1, 8]

  - id: lead_vehicle_braking
    description: Ego vehicle follows a lead vehicle that suddenly slows down
    keywords: [object_detection, radar_perception, sensor_fusion_localization, local_navigation, braking]
    parameters:
      ego_speed_kmh: [30, 90]
      lead_vehicle_speed_kmh: [10, 80]
      initial_gap_m: [5, 40]

  - id: route_following
    description: Ego vehicle follows a longer route with navigation-relevant turns
    keywords: [gps_localization, odometry_localization, sensor_fusion_localization, global_navigation, local_navigation, steering_control]
    parameters:
      route_length_m: [100, 1000]
      turn_count: [1, 5]
      ego_speed_kmh: [20, 70]

  - id: gps_degraded_navigation
    description: Ego vehicle must continue navigation under degraded GPS quality
    keywords: [gps_localization, odometry_localization, sensor_fusion_localization, global_navigation, local_navigation]
    parameters:
      gps_noise_level: [low, medium, high]
      route_length_m: [100, 800]
      ego_speed_kmh: [20, 60]
