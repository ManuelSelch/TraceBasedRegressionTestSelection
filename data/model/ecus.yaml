ecus:
  - id: camera
    type: sensor
    forwards_only: false
    description: Captures visual scene information
    outputs: [camera_image]

  - id: object_perception
    type: processing
    forwards_only: false
    description: Extracts object-level perception outputs from camera input
    inputs: [camera_image]
    outputs: [bounding_boxes, tracked_objects]

  - id: lane_perception
    type: processing
    forwards_only: false
    description: Extracts lane structure from camera input
    inputs: [camera_image]
    outputs: [lane_boundaries]

  - id: localization
    type: processing
    forwards_only: false
    description: Estimates ego vehicle pose
    outputs: [ego_pose]

  - id: planner
    type: processing
    forwards_only: false
    description: Computes low-level planning targets from perception and ego state
    inputs: [tracked_objects, lane_boundaries, ego_pose]
    outputs: [target_speed, target_curvature]

  - id: steering_controller
    type: processing
    forwards_only: false
    description: Converts target curvature to steering commands
    inputs: [target_curvature]
    outputs: [steer_cmd]

  - id: brake_controller
    type: processing
    forwards_only: false
    description: Converts target speed to braking commands
    inputs: [target_speed]
    outputs: [brake_cmd]
