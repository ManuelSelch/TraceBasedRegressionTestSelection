signals:
  - id: camera_image
    level: sensor
    producer: camera
    consumers: [object_detector, lane_perception, traffic_light_detector, speed_sign_detector, parking_perception]
    description: Raw front camera image

  - id: radar_detections
    level: sensor
    producer: radar
    consumers: [object_tracker]
    description: Radar detections with range and relative velocity

  - id: gps_fix
    level: sensor
    producer: gps
    consumers: [gps_processor]
    description: Raw GPS position measurement

  - id: odometry_delta
    level: sensor
    producer: odometry
    consumers: [odometry_processor]
    description: Incremental odometry motion measurement

  - id: ultrasonic_ranges
    level: sensor
    producer: ultrasonic
    consumers: [parking_perception]
    description: Short-range distance readings around the vehicle

  - id: bounding_boxes
    level: perception
    producer: object_detector
    consumers: [object_tracker]
    description: Camera-based object detections before temporal fusion

  - id: tracked_objects
    level: perception
    producer: object_tracker
    consumers: [acc_module, local_planner]
    description: Temporally fused dynamic and static object tracks

  - id: lane_boundaries
    level: perception
    producer: lane_perception
    consumers: [local_planner]
    description: Estimated lane boundary geometry

  - id: traffic_light_state
    level: perception
    producer: traffic_light_detector
    consumers: [local_planner]
    description: Estimated current traffic light state

  - id: speed_limit
    level: perception
    producer: speed_sign_detector
    consumers: [local_planner]
    description: Active speed limit estimate from road signs

  - id: gps_pose
    level: localization
    producer: gps_processor
    consumers: [localization_fusion]
    description: Pose estimate derived from GPS

  - id: odometry_pose
    level: localization
    producer: odometry_processor
    consumers: [localization_fusion]
    description: Pose estimate derived from odometry integration

  - id: fused_ego_pose
    level: localization
    producer: localization_fusion
    consumers: [global_planner, local_planner, parking_planner]
    description: Fused ego position and orientation estimate

  - id: ego_velocity
    level: localization
    producer: localization_fusion
    consumers: [acc_module, local_planner]
    description: Estimated ego velocity

  - id: global_route
    level: planning
    producer: global_planner
    consumers: [local_planner]
    description: High-level route to the destination

  - id: acc_target_speed
    level: planning
    producer: acc_module
    consumers: [local_planner, brake_controller]
    description: ACC-derived longitudinal speed recommendation

  - id: target_speed
    level: planning
    producer: local_planner
    consumers: [brake_controller]
    description: Planned longitudinal speed target

  - id: target_curvature
    level: planning
    producer: local_planner
    consumers: [steering_controller]
    description: Planned lateral curvature target

  - id: parking_slot_pose
    level: perception
    producer: parking_perception
    consumers: [parking_planner]
    description: Estimated pose of a free parking slot

  - id: parking_target_speed
    level: planning
    producer: parking_planner
    consumers: [brake_controller]
    description: Low-speed parking maneuver target speed

  - id: parking_target_curvature
    level: planning
    producer: parking_planner
    consumers: [steering_controller]
    description: Low-speed parking maneuver target curvature

  - id: steer_cmd
    level: control
    producer: steering_controller
    consumers: []
    description: Steering actuator command

  - id: brake_cmd
    level: control
    producer: brake_controller
    consumers: []
    description: Brake actuator command
