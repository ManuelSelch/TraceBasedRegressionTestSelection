signals:
  - id: camera_image
    level: sensor
    producer: camera
    consumers: [object_perception, lane_perception]
    description: Raw front camera image

  - id: bounding_boxes
    level: perception
    producer: object_perception
    consumers: []
    description: Raw object detections before temporal fusion

  - id: tracked_objects
    level: perception
    producer: object_perception
    consumers: [planner]
    description: Temporally fused object tracks

  - id: lane_boundaries
    level: perception
    producer: lane_perception
    consumers: [planner]
    description: Estimated lane boundary geometry

  - id: ego_pose
    level: localization
    producer: localization
    consumers: [planner]
    description: Estimated position and orientation of ego vehicle

  - id: target_speed
    level: planning
    producer: planner
    consumers: [brake_controller]
    description: Planned longitudinal speed target

  - id: target_curvature
    level: planning
    producer: planner
    consumers: [steering_controller]
    description: Planned lateral curvature target

  - id: steer_cmd
    level: control
    producer: steering_controller
    consumers: []
    description: Steering actuator command

  - id: brake_cmd
    level: control
    producer: brake_controller
    consumers: []
    description: Brake actuator command
