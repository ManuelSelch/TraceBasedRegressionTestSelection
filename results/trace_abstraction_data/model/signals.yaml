signals:
  - id: camera_image
    level: sensor
    producer: camera
    consumers: [lane_perception, parking_perception]
    description: Raw camera image

  - id: radar_detections
    level: sensor
    producer: radar
    consumers: [object_tracker]
    description: Raw radar detections

  - id: gps_fix
    level: sensor
    producer: gps
    consumers: [localization_fusion]
    description: Raw GPS fix

  - id: odometry_delta
    level: sensor
    producer: odometry
    consumers: [localization_fusion]
    description: Raw odometry increment

  - id: ultrasonic_ranges
    level: sensor
    producer: ultrasonic
    consumers: [parking_perception]
    description: Raw ultrasonic distances

  - id: lane_boundaries
    level: perception
    producer: lane_perception
    consumers: [lane_controller]
    description: High-level lane geometry abstraction

  - id: tracked_objects
    level: perception
    producer: object_tracker
    consumers: [acc_controller]
    description: High-level object abstraction

  - id: fused_ego_pose
    level: localization
    producer: localization_fusion
    consumers: [lane_controller, acc_controller, parking_controller]
    description: High-level ego-pose abstraction

  - id: parking_slot_pose
    level: perception
    producer: parking_perception
    consumers: [parking_controller]
    description: High-level parking-slot abstraction

  - id: lane_steer_cmd
    level: control
    producer: lane_controller
    consumers: [steering_arbiter]
    description: Steering command from lane-following controller

  - id: acc_brake_cmd
    level: control
    producer: acc_controller
    consumers: [braking_arbiter]
    description: Braking command from ACC controller

  - id: parking_steer_cmd
    level: control
    producer: parking_controller
    consumers: [steering_arbiter]
    description: Steering command from parking controller

  - id: parking_brake_cmd
    level: control
    producer: parking_controller
    consumers: [braking_arbiter]
    description: Braking command from parking controller

  - id: steer_actuator_cmd
    level: control
    producer: steering_arbiter
    consumers: []
    description: Final steering actuator command selected by arbiter

  - id: brake_actuator_cmd
    level: control
    producer: braking_arbiter
    consumers: []
    description: Final braking actuator command selected by arbiter
