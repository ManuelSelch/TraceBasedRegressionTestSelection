ecus:
  - id: camera
    type: sensor
    forwards_only: false
    description: Captures raw front-camera data
    outputs: [camera_image]

  - id: radar
    type: sensor
    forwards_only: false
    description: Captures raw radar detections
    outputs: [radar_detections]

  - id: gps
    type: sensor
    forwards_only: false
    description: Provides raw global position fixes
    outputs: [gps_fix]

  - id: odometry
    type: sensor
    forwards_only: false
    description: Provides raw incremental ego-motion estimates
    outputs: [odometry_delta]

  - id: ultrasonic
    type: sensor
    forwards_only: false
    description: Provides short-range parking distances
    outputs: [ultrasonic_ranges]

  - id: lane_perception
    type: processing
    forwards_only: false
    description: Derives lane boundaries from camera input
    inputs: [camera_image]
    outputs: [lane_boundaries]

  - id: object_tracker
    type: processing
    forwards_only: false
    description: Derives tracked objects from radar input
    inputs: [radar_detections]
    outputs: [tracked_objects]

  - id: localization_fusion
    type: processing
    forwards_only: false
    description: Fuses GPS and odometry into an ego-pose estimate
    inputs: [gps_fix, odometry_delta]
    outputs: [fused_ego_pose]

  - id: lane_controller
    type: processing
    forwards_only: false
    description: Computes steering commands for lane-following mode
    inputs: [lane_boundaries, fused_ego_pose]
    outputs: [lane_steer_cmd]

  - id: acc_controller
    type: processing
    forwards_only: false
    description: Computes braking commands for adaptive cruise control mode
    inputs: [tracked_objects, fused_ego_pose]
    outputs: [acc_brake_cmd]

  - id: parking_controller
    type: processing
    forwards_only: false
    description: Computes steering and braking commands for parking mode
    inputs: [parking_slot_pose, fused_ego_pose]
    outputs: [parking_steer_cmd, parking_brake_cmd]

  - id: parking_perception
    type: processing
    forwards_only: false
    description: Detects a parking slot from camera and ultrasonic input
    inputs: [camera_image, ultrasonic_ranges]
    outputs: [parking_slot_pose]

  - id: steering_arbiter
    type: arbiter
    forwards_only: false
    description: Selects the active steering command based on current operating mode
    inputs: [lane_steer_cmd, parking_steer_cmd]
    outputs: [steer_actuator_cmd]
    mode_inputs:
      driving: lane_steer_cmd
      parking: parking_steer_cmd

  - id: braking_arbiter
    type: arbiter
    forwards_only: false
    description: Selects the active braking command based on current operating mode
    inputs: [acc_brake_cmd, parking_brake_cmd]
    outputs: [brake_actuator_cmd]
    mode_inputs:
      driving: acc_brake_cmd
      parking: parking_brake_cmd
