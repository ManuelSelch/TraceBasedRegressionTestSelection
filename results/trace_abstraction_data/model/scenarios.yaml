scenarios:
  - id: lane_following_raw
    description: Lane-following scenario executed from raw camera and localization inputs
    keywords: [lane_raw]
    active_arbiter_modes:
      steering_arbiter: driving
      braking_arbiter: driving
    parameters:
      road_curvature: [low, medium]
      ego_speed_kmh: [30, 70]

  - id: lane_following_high
    description: Lane-following scenario executed from injected lane boundaries and fused ego pose
    keywords: [lane_high]
    active_arbiter_modes:
      steering_arbiter: driving
      braking_arbiter: driving
    parameters:
      road_curvature: [low, medium]
      ego_speed_kmh: [30, 70]

  - id: car_following_raw
    description: Car-following scenario executed from raw radar and localization inputs
    keywords: [follow_raw]
    active_arbiter_modes:
      steering_arbiter: driving
      braking_arbiter: driving
    parameters:
      ego_speed_kmh: [40, 90]
      lead_vehicle_speed_kmh: [20, 80]
      initial_gap_m: [10, 40]

  - id: car_following_high
    description: Car-following scenario executed from injected tracked objects and fused ego pose
    keywords: [follow_high]
    active_arbiter_modes:
      steering_arbiter: driving
      braking_arbiter: driving
    parameters:
      ego_speed_kmh: [40, 90]
      lead_vehicle_speed_kmh: [20, 80]
      initial_gap_m: [10, 40]

  - id: route_following_raw
    description: Route-following scenario executed from raw localization inputs
    keywords: [route_raw]
    active_arbiter_modes:
      steering_arbiter: driving
      braking_arbiter: driving
    parameters:
      route_length_m: [200, 1000]
      turn_count: [1, 5]
      ego_speed_kmh: [30, 70]

  - id: route_following_high
    description: Route-following scenario executed from injected fused ego pose
    keywords: [route_high]
    active_arbiter_modes:
      steering_arbiter: driving
      braking_arbiter: driving
    parameters:
      route_length_m: [200, 1000]
      turn_count: [1, 5]
      ego_speed_kmh: [30, 70]

  - id: parallel_parking_raw
    description: Parking scenario executed from raw camera, ultrasonic, and localization inputs
    keywords: [parking_raw]
    active_arbiter_modes:
      steering_arbiter: parking
      braking_arbiter: parking
    parameters:
      slot_length_m: [5, 8]
      initial_speed_kmh: [3, 10]
      lateral_offset_m: [0.2, 1.0]

  - id: parallel_parking_high
    description: Parking scenario executed from injected parking-slot pose and fused ego pose
    keywords: [parking_high]
    active_arbiter_modes:
      steering_arbiter: parking
      braking_arbiter: parking
    parameters:
      slot_length_m: [5, 8]
      initial_speed_kmh: [3, 10]
      lateral_offset_m: [0.2, 1.0]

  - id: camera_sensor_test
    description: Direct validation of the camera sensor output
    keywords: [camera_sensor]
    parameters:
      illumination: [normal]

  - id: radar_sensor_test
    description: Direct validation of the radar sensor output
    keywords: [radar_sensor]
    parameters:
      target_distance_m: [20]

  - id: gps_sensor_test
    description: Direct validation of the GPS sensor output
    keywords: [gps_sensor]
    parameters:
      satellite_visibility: [good]

  - id: odometry_sensor_test
    description: Direct validation of the odometry sensor output
    keywords: [odometry_sensor]
    parameters:
      wheel_slip: [low]

  - id: ultrasonic_sensor_test
    description: Direct validation of the ultrasonic sensor output
    keywords: [ultrasonic_sensor]
    parameters:
      obstacle_distance_m: [0.5]
